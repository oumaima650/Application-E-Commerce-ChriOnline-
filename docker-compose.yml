services:
  vault:
    image: hashicorp/vault:latest
    container_name: vault-chri
    user: root
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: chri-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_LOCAL_CONFIG: '{"disable_mlock": true}'
    ports:
      - "8200:8200"
    restart: unless-stopped