<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>reCAPTCHA</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: transparent;
            overflow: visible;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
        }
        #recaptcha-container {
            width: 304px;
            height: 78px;
        }
        /* Style for challenge mode: hide the checkbox */
        body.challenge-mode #recaptcha-container {
            display: none !important;
        }
        /* Ensure the challenge bubble is top-aligned when container is hidden */
        body.challenge-mode {
            justify-content: center;
            align-items: center;
            padding-top: 0;
        }
        
        /* Force ReCAPTCHA challenge wrappers and iframe to expand to the modal size */
        body.challenge-mode > div:not(#recaptcha-container) {
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            clip: auto !important;
            transform: none !important;
        }
        
        body.challenge-mode iframe[src*="api2/bframe"] {
            width: 400px !important;
            height: 580px !important;
            max-width: none !important;
            max-height: none !important;
            clip: auto !important;
        }
    </style>
    <script type="text/javascript">
        var recaptchaToken = "";
        var challengeActive = false;

        var verifyCallback = function(token) {
            recaptchaToken = token;
            alert("TOKEN:" + token);
            
            // Allow the Java side a brief moment to close the modal and move the WebView back
            // before we restore the checkbox visibility
            setTimeout(function() {
                challengeActive = false;
                document.body.classList.remove('challenge-mode');
            }, 350);
        };

        var expiredCallback = function() {
            recaptchaToken = "";
            challengeActive = false;
            document.body.classList.remove('challenge-mode');
            alert("EXPIRED");
        };

        var errorCallback = function() {
            recaptchaToken = "";
            challengeActive = false;
            document.body.classList.remove('challenge-mode');
            alert("ERROR");
        };

        function checkBFrameVisibility() {
            try {
                var iframes = document.getElementsByTagName('iframe');
                for (var i = 0; i < iframes.length; i++) {
                    if (iframes[i].src.indexOf('api2/bframe') !== -1) {
                        var container = iframes[i];
                        // Ascend until the parent is document.body
                        while (container && container.parentNode && container.parentNode !== document.body) {
                            container = container.parentNode;
                        }
                        
                        if (container && container.tagName === 'DIV') {
                            var style = window.getComputedStyle(container);
                            var isVisible = (style.visibility === 'visible' && style.display !== 'none' && parseFloat(style.opacity) > 0.01);
                            
                            if (isVisible && !challengeActive) {
                                challengeActive = true;
                                document.body.classList.add('challenge-mode');
                                console.log("[reCAPTCHA] Challenge started!");
                                alert("CHALLENGE_STARTED");
                            } else if (!isVisible && challengeActive) {
                                challengeActive = false;
                                document.body.classList.remove('challenge-mode');
                                console.log("[reCAPTCHA] Challenge closed!");
                                alert("CHALLENGE_CLOSED");
                            }
                        }
                        return;
                    }
                }
            } catch(e) {
                console.error("Visibility check error: " + e);
            }
        }

        var onloadCallback = function() {
            grecaptcha.render('recaptcha-container', {
              'sitekey' : '6LcS3qQsAAAAAAWz9c2T-BjiWTPVWctTW3RyQJr5',
              'callback' : verifyCallback,
              'expired-callback': expiredCallback,
              'error-callback': errorCallback,
              'theme' : 'light'
            });

            setInterval(checkBFrameVisibility, 200);
        };
        
        function resetRecaptcha() {
            if (typeof grecaptcha !== 'undefined') grecaptcha.reset();
            recaptchaToken = "";
            challengeActive = false;
            document.body.classList.remove('challenge-mode');
        }
    </script>
    <script src="https://www.google.com/recaptcha/api.js?onload=onloadCallback&render=explicit" async defer></script>
</head>
<body>
    <div id="recaptcha-container"></div>
</body>
</html>
